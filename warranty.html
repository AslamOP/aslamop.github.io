<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MochaMorn – Warranty Registration</title>
  <link rel="icon" type="image/jpg" href="favicon.jpg" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background: #000;
      margin: 0;
      color: #0ff;
    }
    header {
      background-color: #000;
      text-align: center;
      padding: 30px;
      box-shadow: 0 0 10px #0ff;
    }
    header h1 {
      font-size: 2.5em;
      color: #0ff;
      text-shadow: 0 0 12px #0ff, 0 0 20px #0ff;
    }
    nav {
      background-color: #020202;
      text-align: center;
      padding: 15px;
      box-shadow: 0 0 8px #0ff;
    }
    nav a {
      color: #0ff;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
      text-shadow: 0 0 5px #0ff;
    }
    nav a:hover {
      color: #fff;
    }
    main {
      max-width: 800px;
      margin: auto;
      padding: 40px 20px;
    }
    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #0ff;
      text-shadow: 0 0 10px #0ff;
    }
    form {
      background: #020202;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 15px #0ff;
    }
    label {
      display: block;
      margin-top: 20px;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      background: #111;
      color: #0ff;
      box-shadow: inset 0 0 5px #0ff;
      font-family: inherit;
    }
    button {
      margin-top: 25px;
      background-color: transparent;
      border: 2px solid #0ff;
      color: #0ff;
      padding: 12px 30px;
      font-size: 1em;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s ease;
    }
    button:hover {
      background-color: #0ff;
      color: #000;
      box-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
    }
    .images {
      margin-top: 50px;
      text-align: center;
    }
    .images img {
      width: 300px;
      margin: 15px;
      border-radius: 12px;
      box-shadow: 0 0 15px #0ff;
    }
    footer {
      background-color: #020202;
      text-align: center;
      padding: 20px;
      margin-top: 60px;
      color: #0ff;
      text-shadow: 0 0 6px #0ff;
    }
  </style>
</head>
<body>
  <header>
    <h1>Warranty Registration – MochaMorn</h1>
  </header>
  <nav>
    <a href="index.html">Home</a>
    <a href="user-manual.html">User Manual</a>
    <a href="contact.html">Contact</a>
    <a href="payment.html">Payment</a>
  </nav>
  <main>
    <h2>Register Your Product</h2>
    <form action="https://formsubmit.co/aslamopcoder@gmail.com" method="POST">
      <label for="name">Customer Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Contact Number:</label>
      <input type="tel" id="phone" name="phone" required>

      <label for="purchase">Date of Purchase:</label>
      <input type="date" id="purchase" name="purchase" required>

      <label for="model">Model Number:</label>
      <input type="text" id="model" name="model">

      <label for="retailer">Retailer Name & Address:</label>
      <textarea id="retailer" name="retailer" rows="3"></textarea>

      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://mochamorn.github.io/thank-you.html">

      <button type="submit">Submit</button>
    </form>

    <div class="images">
      <img src="warrenty.jpg" alt="Warranty Certificate">
      <img src="warrenty1.jpg" alt="Warranty Stamp">
    </div>
  </main>
  <footer>
    &copy; 2025 MochaMorn · For warranty help, call +91 7598809727
  </footer>
</body>
</html>
