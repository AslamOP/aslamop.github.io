<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MochaMorn Feedback</title>
  <link rel="icon" type="image/jpg" href="favicon.jpg" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(ellipse at center, #000 60%, #020d0d 100%);
      color: #0ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 30px 20px;
    }
    h1 {
      font-size: 3em;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      animation: pulse 2s infinite alternate;
    }
    @keyframes pulse {
      0% {
        text-shadow: 0 0 10px #0ff;
      }
      100% {
        text-shadow: 0 0 25px #0ff;
      }
    }
    .container {
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 30px;
      width: 80%;
      max-width: 900px;
    }
    .feedback-section {
      margin-top: 30px;
    }
    .feedback-card {
      margin-bottom: 30px;
    }
    .feedback-card img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }
    .feedback-card h3 {
      color: #0ff;
      margin-top: 10px;
      font-size: 1.5em;
    }
    textarea {
      width: 90%;
      height: 100px;
      padding: 10px;
      font-size: 1.2em;
      border-radius: 8px;
      border: 1px solid #0ff;
      margin-top: 15px;
      background-color: transparent;
      color: #0ff;
    }
    button {
      margin-top: 20px;
      padding: 12px 30px;
      background-color: transparent;
      border: 2px solid #0ff;
      border-radius: 10px;
      color: #0ff;
      font-size: 1.2em;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #0ff;
      color: black;
      box-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My MochaMorn Feedback</h1>
    <div class="feedback-section">
      <div class="feedback-card">
        <h3>Before the Product</h3>
        <img src="before.jpeg" alt="Before MochaMorn">
      </div>
      <div class="feedback-card">
        <h3>After the Product</h3>
        <img src="after.jpeg" alt="After MochaMorn">
      </div>
    </div>
    <div class="experience">
      <h2>Share Your Experience</h2>
      <textarea placeholder="Tell us how MochaMorn changed your mornings..."></textarea>
      <br>
      <button>Submit Feedback</button>
    </div>
  </div>
</body>
</html>
