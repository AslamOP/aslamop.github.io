<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You – MochaMorn</title>
  <link rel="icon" type="image/jpg" href="favicon.jpg" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(ellipse at center, #000 60%, #020d0d 100%);
      color: #0ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 30px 20px;
    }
    h1 {
      font-size: 3em;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      animation: pulse 2s infinite alternate;
    }
    @keyframes pulse {
      0% {
        text-shadow: 0 0 10px #0ff;
      }
      100% {
        text-shadow: 0 0 25px #0ff;
      }
    }
    p {
      font-size: 1.2em;
      margin-top: 15px;
      text-shadow: 0 0 6px #0ff;
    }
    a {
      display: inline-block;
      margin-top: 35px;
      padding: 12px 30px;
      background-color: transparent;
      border: 2px solid #0ff;
      border-radius: 10px;
      color: #0ff;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1em;
      transition: 0.3s;
    }
    a:hover {
      background-color: #0ff;
      color: black;
      box-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
    }
  </style>
</head>
<body>
  <h1>Thank You!</h1>
  <p>Your submission has been successfully received.</p>
  <p>We’ll get back to you soon. Stay cozy ☕</p>
  <a href="index.html">Back to Home</a>
</body>
</html>
