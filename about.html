  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a1d, #4e4e50);
      color: #fff;
    }

    header {
      padding: 30px 20px;
      text-align: center;
      background: #0f0f10;
    }

    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      color: #00ffd5;
      text-shadow: 2px 2px 10px #000;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 25px;
      background: rgba(255, 255, 255, 0.05);
      padding: 15px 0;
      box-shadow: 0 2px 5px rgba(255, 255, 255, 0.05);
    }

    nav a {
      color: #ffffffcc;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #00ffd5;
    }

    .team-section {
      padding: 50px 20px;
      text-align: center;
    }

    .team-section h2 {
      font-size: 2rem;
      color: #00ffd5;
      margin-bottom: 30px;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 30px;
      padding: 0 20px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .member-card {
      background: rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0, 255, 213, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .member-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 30px #00ffd5;
    }

    .member-card h3 {
      font-size: 1.4rem;
      color: #00ffd5;
    }

    .member-card p {
      font-size: 1rem;
      color: #ccc;
      margin-top: 5px;
    }

    .dev-label {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #f9b857;
      font-weight: bold;
      text-shadow: 0 0 5px #f9b857;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      text-align: center;
      color: #999;
      background: rgba(255, 255, 255, 0.03);
      font-size: 0.9rem;
    }
  </style>
</head>
