<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact – MochaMorn</title>
  <link rel="icon" type="image/jpg" href="favicon.jpg" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #000;
      color: #0ff;
      overflow-x: hidden;
    }
    header {
      background: #111;
      padding: 30px 20px;
      text-align: center;
      color: #0ff;
      text-shadow: 0 0 10px #0ff;
      border-bottom: 2px solid #0ff;
      animation: glow 2s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from {
        text-shadow: 0 0 5px #0ff, 0 0 10px #0ff;
      }
      to {
        text-shadow: 0 0 20px #0ff, 0 0 30px #0ff;
      }
    }
    nav {
      background: #111;
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid #0ff;
    }
    nav a {
      color: #0ff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }
    nav a:hover {
      color: #fff;
      text-shadow: 0 0 5px #0ff, 0 0 10px #0ff;
    }
    main {
      max-width: 800px;
      margin: auto;
      padding: 30px 20px;
    }
    h2 {
      text-shadow: 0 0 10px #0ff;
      border-bottom: 1px dashed #0ff;
      padding-bottom: 5px;
    }
    .info {
      background: rgba(0,255,255,0.05);
      border: 1px solid #0ff;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 30px;
      box-shadow: 0 0 15px #0ff44a88;
    }
    .info a {
      color: #0ff;
      text-decoration: underline;
    }
    form {
      background: rgba(0,255,255,0.05);
      padding: 25px;
      border: 1px solid #0ff;
      border-radius: 12px;
      box-shadow: 0 0 15px #0ff44a88;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #0ff;
      background: black;
      color: #0ff;
      font-family: 'Orbitron', sans-serif;
      font-size: 1em;
    }
    input:focus, textarea:focus {
      outline: none;
      box-shadow: 0 0 10px #0ff;
    }
    button {
      background: black;
      color: #0ff;
      padding: 12px 25px;
      border: 2px solid #0ff;
      border-radius: 10px;
      margin-top: 20px;
      cursor: pointer;
      font-size: 1em;
      transition: 0.4s;
    }
    button:hover {
      background: #0ff;
      color: black;
      text-shadow: 0 0 10px #000;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      border-top: 2px solid #0ff;
      color: #0ff;
      text-shadow: 0 0 5px #0ff;
    }
  </style>
</head>
<body>
  <header>
    <h1>Contact MochaMorn</h1>
  </header>
  <nav>
    <a href="index.html">Home</a>
    <a href="user-manual.html">User Manual</a>
    <a href="warranty.html">Warranty</a>
    <a href="payment.html">Payment</a>
  </nav>
  <main>
    <div class="info">
      <h2>Customer Support</h2>
      <p><strong>Phone:</strong> +91 7598809727</p>
      <p><strong>Email:</strong> support@mochamorn.com</p>
      <p><strong>WhatsApp:</strong> <a href="https://wa.me/917598809727">Click to chat</a></p>
    </div>

    <h2>Send us a message</h2>
    <form action="https://formsubmit.co/aslamopcoder@gmail.com" method="POST">
      <label for="name">Your Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Your Email:</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://mochamorn.github.io/thank-you.html">

      <button type="submit">Send Message</button>
    </form>
  </main>
  <footer>
    &copy; 2025 MochaMorn · Designed with 💙 & caffeine ☕
  </footer>
</body>
</html>
